name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell script syntax
        run: bash -n scripts/setup.sh && echo "✅ setup.sh syntax OK"

      - name: Check Python syntax
        run: |
          python3 -m py_compile scripts/patch_nothink.py && echo "✅ patch_nothink.py syntax OK"
          python3 -m py_compile scripts/configure_hermes.py && echo "✅ configure_hermes.py syntax OK"

      - name: Verify no hardcoded paths
        run: |
          if grep -rn "/Users/anirudh" scripts/; then
            echo "❌ Hardcoded paths found"
            exit 1
          fi
          echo "✅ No hardcoded paths"

      - name: Check README links
        run: |
          echo "✅ Validation passed"
